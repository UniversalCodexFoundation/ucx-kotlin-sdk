# =============================================================================
# Unicodex Kotlin SDK -- CI Workflow
# Unicodex Kotlin SDK -- CI 工作流
#
# Triggers on push/PR to main or master branches.
# 在 push/PR 到 main 或 master 分支时触发。
# =============================================================================

name: CI

# ---------------------------------------------------------------------------
# Trigger conditions / 触发条件
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ---------------------------------------------------------------------------
# Permissions -- least-privilege, read-only access to repo contents.
# 权限 -- 最小权限原则，仅对仓库内容只读访问。
# ---------------------------------------------------------------------------
permissions:
  contents: read

# ---------------------------------------------------------------------------
# Concurrency -- cancel redundant runs on the same ref.
# 并发控制 -- 同一 ref 的冗余运行将被取消。
# ---------------------------------------------------------------------------
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Build job -- compile the project with Gradle.
  # 构建任务 -- 使用 Gradle 编译项目。
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository / 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up JDK 21 (Temurin) / 配置 JDK 21 (Temurin 发行版)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Set up Gradle via the official action / 通过官方 action 配置 Gradle
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build the project with Gradle / 使用 Gradle 构建项目
      - name: Build with Gradle
        run: gradle build

  # -------------------------------------------------------------------------
  # Test job -- run the test suite with Gradle.
  # 测试任务 -- 使用 Gradle 运行测试套件。
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    # Run tests after build succeeds / 在构建成功后运行测试
    needs: build

    steps:
      # Checkout the repository / 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up JDK 21 (Temurin) / 配置 JDK 21 (Temurin 发行版)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Set up Gradle via the official action / 通过官方 action 配置 Gradle
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Run tests with Gradle / 使用 Gradle 运行测试
      - name: Run tests
        run: gradle test
